name: Heartbeat diario OP

on:
  schedule:
    - cron: '5 23 * * *'  # Todos los días 23:05 UTC (5 min después del de Pokémon)
  workflow_dispatch:

jobs:
  beat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - uses: actions/cache/restore@v5
        with:
          path: state.json
          key: monitor-state
          restore-keys: monitor-state
      - env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 heartbeat.py
      - name: Keep-alive commit (evita que GitHub pause los crons por inactividad)
        run: |
          date -u +"%Y-%m-%d %H:%M UTC" > .last_heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last_heartbeat
          git diff --staged --quiet || git commit -m "heartbeat: keep-alive [skip ci]"
          git push
